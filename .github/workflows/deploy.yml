name: Deploy to Cloud Run

# ============================================================================
# DORMANT BY DEFAULT — this workflow does nothing until you enable it.
#
# Every job is gated on the repository variable DEPLOY_ENABLED == 'true'.
# Until you set that variable, runs are skipped (green, no-op). This lets the
# file live in the repo safely while you are still testing manually.
#
# ---------------------------------------------------------------------------
# HOW TO ENABLE (after Phases 1–8 of docs/DEPLOYMENT_GCP_CLOUDRUN_NEON.md):
#
# 1. Set up Workload Identity Federation (no long-lived keys):
#      https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation
#
# 2. In GitHub → Settings → Secrets and variables → Actions:
#    - Repository variable:
#        DEPLOY_ENABLED = true
#    - Create two environments: `test` and `prod`
#    - In EACH environment, define these variables:
#        GCP_PROJECT_ID
#        GCP_REGION
#        GCP_WIF_PROVIDER
#        GCP_DEPLOY_SA
#        AR_REPO
#        API_SERVICE
#        WEB_SERVICE
#        API_RUNTIME_ENV_VARS
#        API_RUNTIME_SECRETS
#        WEB_NEXT_PUBLIC_BRAND_LOGO
#        WEB_RUNTIME_ENV_VARS
#        WEB_RUNTIME_SECRETS
#      Optional environment variables:
#        WEB_API_INTERNAL_URL
#        WEB_ADMIN_API_INTERNAL_URL
#    - In EACH environment, define these secrets for the web image build/deploy:
#        WEB_AUTH_URL
#        WEB_NEXT_PUBLIC_API_URL
#        WEB_NEXT_PUBLIC_RZP_KEY
#        WEB_AUTH_SECRET
#
# 3. Runtime secrets (DATABASE_URL, RAZORPAY_*, IMAGEKIT_*, etc.) are read by
#    Cloud Run from Secret Manager (see Phase 4) — NOT from GitHub.
#
# Branch model:
#   push to `test`    → deploys the GitHub `test` environment
#   push to `main`    → deploys the GitHub `prod` environment
#   workflow_dispatch → choose either environment manually
# ============================================================================

on:
  push:
    branches: [test, main]
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target environment
        required: true
        type: choice
        options:
          - test
          - prod
        default: test

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.target || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build images & deploy
    runs-on: ubuntu-latest
    # Gate: skipped entirely until you create the DEPLOY_ENABLED variable.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref_name == 'main' && 'prod' || 'test') }}
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    env:
      PROJECT: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      AR_REPO: ${{ vars.AR_REPO }}
      AR: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}
      API_SERVICE: ${{ vars.API_SERVICE }}
      WEB_SERVICE: ${{ vars.WEB_SERVICE }}
      API_RUNTIME_ENV_VARS: ${{ vars.API_RUNTIME_ENV_VARS }}
      API_RUNTIME_SECRETS: ${{ vars.API_RUNTIME_SECRETS }}
      WEB_AUTH_URL: ${{ secrets.WEB_AUTH_URL }}
      WEB_NEXT_PUBLIC_API_URL: ${{ secrets.WEB_NEXT_PUBLIC_API_URL }}
      WEB_NEXT_PUBLIC_RZP_KEY: ${{ secrets.WEB_NEXT_PUBLIC_RZP_KEY }}
      WEB_NEXT_PUBLIC_BRAND_LOGO: ${{ vars.WEB_NEXT_PUBLIC_BRAND_LOGO }}
      WEB_RUNTIME_ENV_VARS: ${{ vars.WEB_RUNTIME_ENV_VARS }}
      WEB_RUNTIME_SECRETS: ${{ vars.WEB_RUNTIME_SECRETS }}
      WEB_API_INTERNAL_URL: ${{ vars.WEB_API_INTERNAL_URL }}
      WEB_ADMIN_API_INTERNAL_URL: ${{ vars.WEB_ADMIN_API_INTERNAL_URL }}
      RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SA || vars.GCP_DEPLOY_SA }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deployment target
        env:
          MANUAL_TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            deploy_env="${MANUAL_TARGET}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            deploy_env="prod"
          elif [[ "${GITHUB_REF_NAME}" == "test" ]]; then
            deploy_env="test"
          else
            echo "Unsupported ref ${GITHUB_REF_NAME} for deploy" >&2
            exit 1
          fi

          required_vars=(PROJECT REGION AR_REPO API_SERVICE WEB_SERVICE WEB_AUTH_URL WEB_NEXT_PUBLIC_API_URL WEB_NEXT_PUBLIC_RZP_KEY API_RUNTIME_SECRETS WEB_RUNTIME_SECRETS)
          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required Actions environment value: ${name}" >&2
              exit 1
            fi
          done

          echo "DEPLOY_ENV=${deploy_env}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${deploy_env}-${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Select GCP project
        run: gcloud config set project "$PROJECT"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ---------------- API ----------------
      - name: Build & push API image
        run: |
          set -euo pipefail
          IMAGE="${AR}/api:${IMAGE_TAG}"
          docker build --platform linux/amd64 -t "$IMAGE" apps/api
          docker push "$IMAGE"
          echo "API_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy API to Cloud Run
        run: |
          set -euo pipefail
          api_env_vars="NODE_ENV=production"
          if [[ -n "${API_RUNTIME_ENV_VARS}" ]]; then
            api_env_vars="${api_env_vars},${API_RUNTIME_ENV_VARS}"
          fi

          gcloud run deploy "${API_SERVICE}" \
            --image="${API_IMAGE}" \
            --region="${REGION}" --platform=managed --allow-unauthenticated \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --port=4000 --cpu=1 --memory=512Mi \
            --min-instances=0 --max-instances=4 --concurrency=80 \
            --set-env-vars="${api_env_vars}" \
            --set-secrets="${API_RUNTIME_SECRETS}"

          api_url="$(gcloud run services describe "${API_SERVICE}" --region="${REGION}" --format='value(status.url)')"
          if [[ -z "${api_url}" ]]; then
            echo "Could not resolve API service URL after deploy" >&2
            exit 1
          fi
          echo "API_SERVICE_URL=${api_url}" >> "$GITHUB_ENV"

      - name: Verify API health
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "${API_SERVICE_URL}/health"

      # ---------------- WEB ----------------
      # NEXT_PUBLIC_* and auth values are baked at build time (see web Dockerfile).
      - name: Build & push Web image
        run: |
          set -euo pipefail
          api_internal_url="${WEB_API_INTERNAL_URL:-${API_SERVICE_URL}}"
          IMAGE="${AR}/web:${IMAGE_TAG}"
          docker build --platform linux/amd64 -t "$IMAGE" apps/web \
            --build-arg AUTH_URL="${WEB_AUTH_URL}" \
            --build-arg AUTH_SECRET="${{ secrets.WEB_AUTH_SECRET }}" \
            --build-arg NEXT_PUBLIC_API_URL="${WEB_NEXT_PUBLIC_API_URL}" \
            --build-arg API_INTERNAL_URL="${api_internal_url}"
          docker push "$IMAGE"
          echo "WEB_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy Web to Cloud Run
        run: |
          set -euo pipefail
          api_internal_url="${WEB_API_INTERNAL_URL:-${API_SERVICE_URL}}"
          admin_api_internal_url="${WEB_ADMIN_API_INTERNAL_URL:-${api_internal_url}}"
          web_env_vars="NODE_ENV=production,NEXT_PUBLIC_API_URL=${WEB_NEXT_PUBLIC_API_URL},API_INTERNAL_URL=${api_internal_url},ADMIN_API_INTERNAL_URL=${admin_api_internal_url},AUTH_URL=${WEB_AUTH_URL},NEXT_PUBLIC_RAZORPAY_KEY_ID=${WEB_NEXT_PUBLIC_RZP_KEY}"
          if [[ -n "${WEB_NEXT_PUBLIC_BRAND_LOGO}" ]]; then
            web_env_vars="${web_env_vars},NEXT_PUBLIC_BRAND_LOGO=${WEB_NEXT_PUBLIC_BRAND_LOGO}"
          fi
          if [[ -n "${WEB_RUNTIME_ENV_VARS}" ]]; then
            web_env_vars="${web_env_vars},${WEB_RUNTIME_ENV_VARS}"
          fi

          gcloud run deploy "${WEB_SERVICE}" \
            --image="${WEB_IMAGE}" \
            --region="${REGION}" --platform=managed --allow-unauthenticated \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --port=3000 --cpu=1 --memory=512Mi \
            --min-instances=0 --max-instances=4 --concurrency=80 \
            --set-env-vars="${web_env_vars}" \
            --set-secrets="${WEB_RUNTIME_SECRETS}"

      - name: Verify web health
        run: |
          set -euo pipefail
          web_url="$(gcloud run services describe "${WEB_SERVICE}" --region="${REGION}" --format='value(status.url)')"
          if [[ -z "${web_url}" ]]; then
            echo "Could not resolve web service URL after deploy" >&2
            exit 1
          fi
          curl --fail --show-error --silent --location "${web_url}" > /dev/null
