name: Deploy tagged release to Cloud Run

# Test builds a selected Git tag once. Production deploys the exact Artifact
# Registry digests created for that tag and never rebuilds source.
on:
  workflow_dispatch:
    inputs:
      version:
        description: Existing release tag (for example v1.2.3)
        required: true
        type: string
      target:
        description: Deployment environment
        required: true
        type: choice
        options: [test, prod]

concurrency:
  group: deploy-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  deploy-test:
    name: Build ${{ inputs.version }} and deploy to test
    if: ${{ inputs.target == 'test' }}
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
      id-token: write
    env: &deployment_env
      PROJECT: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      AR_REPO: ${{ vars.AR_REPO }}
      API_SERVICE: ${{ vars.API_SERVICE }}
      WEB_SERVICE: ${{ vars.WEB_SERVICE }}
      API_RUNTIME_ENV_VARS: ${{ vars.API_RUNTIME_ENV_VARS }}
      API_RUNTIME_SECRETS: ${{ vars.API_RUNTIME_SECRETS }}
      WEB_AUTH_URL: ${{ secrets.WEB_AUTH_URL }}
      WEB_NEXT_PUBLIC_API_URL: ${{ secrets.WEB_NEXT_PUBLIC_API_URL }}
      WEB_NEXT_PUBLIC_RZP_KEY: ${{ secrets.WEB_NEXT_PUBLIC_RZP_KEY }}
      WEB_AUTH_SECRET: ${{ secrets.WEB_AUTH_SECRET }}
      WEB_NEXT_PUBLIC_BRAND_LOGO: ${{ vars.WEB_NEXT_PUBLIC_BRAND_LOGO }}
      WEB_RUNTIME_ENV_VARS: ${{ vars.WEB_RUNTIME_ENV_VARS }}
      WEB_RUNTIME_SECRETS: ${{ vars.WEB_RUNTIME_SECRETS }}
      WEB_API_INTERNAL_URL: ${{ vars.WEB_API_INTERNAL_URL }}
      WEB_ADMIN_API_INTERNAL_URL: ${{ vars.WEB_ADMIN_API_INTERNAL_URL }}
      RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SA || vars.GCP_DEPLOY_SA }}
    steps:
      - name: Validate release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Use a version such as v1.2.3" >&2; exit 1; }
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          required=(PROJECT REGION AR_REPO API_SERVICE WEB_SERVICE API_RUNTIME_SECRETS WEB_AUTH_URL WEB_NEXT_PUBLIC_API_URL WEB_NEXT_PUBLIC_RZP_KEY WEB_AUTH_SECRET WEB_RUNTIME_SECRETS)
          for name in "${required[@]}"; do [[ -n "${!name:-}" ]] || { echo "Missing test environment setting: ${name}" >&2; exit 1; }; done
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Artifact Registry and validate image tags
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          ar="${REGION}-docker.pkg.dev/${PROJECT}/${AR_REPO}"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          for image in api web; do
            if gcloud artifacts docker images describe "${ar}/${image}:${VERSION}" --format='value(image_summary.digest)' >/dev/null 2>&1; then
              echo "${image}:${VERSION} already exists; version tags are immutable." >&2
              exit 1
            fi
          done
          echo "AR=${ar}" >> "$GITHUB_ENV"

      - name: Build API image
        env:
          VERSION: ${{ inputs.version }}
        run: docker build --platform linux/amd64 --tag "$AR/api:${VERSION}" apps/api

      - name: Publish API image
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          api_tag="$AR/api:${VERSION}"
          docker push "$api_tag"
          api_digest="$(gcloud artifacts docker images describe "$api_tag" --format='value(image_summary.digest)')"
          echo "API_IMAGE=${AR}/api@${api_digest}" >> "$GITHUB_ENV"

      - name: Deploy API to test
        run: |
          set -euo pipefail
          api_env_vars="NODE_ENV=production"
          [[ -z "$API_RUNTIME_ENV_VARS" ]] || api_env_vars="${api_env_vars},${API_RUNTIME_ENV_VARS}"
          gcloud run deploy "$API_SERVICE" --image="$API_IMAGE" --region="$REGION" --platform=managed --allow-unauthenticated --service-account="$RUNTIME_SERVICE_ACCOUNT" --port=4000 --cpu=1 --memory=512Mi --min-instances=0 --max-instances=4 --concurrency=80 --set-env-vars="$api_env_vars" --set-secrets="$API_RUNTIME_SECRETS"
          echo "API_URL=$(gcloud run services describe "$API_SERVICE" --region="$REGION" --format='value(status.url)')" >> "$GITHUB_ENV"

      - name: Check API health
        run: curl --fail --show-error --silent "${API_URL}/health"

      - name: Build web image
        env:
          VERSION: ${{ inputs.version }}
        run: docker build --platform linux/amd64 --tag "$AR/web:${VERSION}" apps/web

      - name: Publish web image
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          web_tag="$AR/web:${VERSION}"
          docker push "$web_tag"
          web_digest="$(gcloud artifacts docker images describe "$web_tag" --format='value(image_summary.digest)')"
          echo "WEB_IMAGE=${AR}/web@${web_digest}" >> "$GITHUB_ENV"

      - name: Deploy web to test
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          api_internal_url="${WEB_API_INTERNAL_URL:-${API_URL}}"
          admin_api_internal_url="${WEB_ADMIN_API_INTERNAL_URL:-${api_internal_url}}"
          web_env_vars="NODE_ENV=production,NEXT_PUBLIC_API_URL=${WEB_NEXT_PUBLIC_API_URL},API_INTERNAL_URL=${api_internal_url},ADMIN_API_INTERNAL_URL=${admin_api_internal_url},AUTH_URL=${WEB_AUTH_URL},NEXT_PUBLIC_RAZORPAY_KEY_ID=${WEB_NEXT_PUBLIC_RZP_KEY}"
          [[ -z "$WEB_NEXT_PUBLIC_BRAND_LOGO" ]] || web_env_vars="${web_env_vars},NEXT_PUBLIC_BRAND_LOGO=${WEB_NEXT_PUBLIC_BRAND_LOGO}"
          [[ -z "$WEB_RUNTIME_ENV_VARS" ]] || web_env_vars="${web_env_vars},${WEB_RUNTIME_ENV_VARS}"
          gcloud run deploy "$WEB_SERVICE" --image="$WEB_IMAGE" --region="$REGION" --platform=managed --allow-unauthenticated --service-account="$RUNTIME_SERVICE_ACCOUNT" --port=3000 --cpu=1 --memory=512Mi --min-instances=0 --max-instances=4 --concurrency=80 --set-env-vars="$web_env_vars,RELEASE_VERSION=${VERSION}" --set-secrets="$WEB_RUNTIME_SECRETS"
          echo "WEB_URL=$(gcloud run services describe "$WEB_SERVICE" --region="$REGION" --format='value(status.url)')" >> "$GITHUB_ENV"

      - name: Check web health
        run: curl --fail --show-error --silent --location "$WEB_URL" > /dev/null

      - name: Write test deployment summary
        env:
          VERSION: ${{ inputs.version }}
        run: |
          printf 'Test deployment succeeded for %s\nAPI: %s\nWeb: %s\n' "$VERSION" "$API_IMAGE" "$WEB_IMAGE" >> "$GITHUB_STEP_SUMMARY"

  deploy-prod:
    name: Promote ${{ inputs.version }} to production
    if: ${{ inputs.target == 'prod' }}
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    env: *deployment_env
    steps:
      - name: Validate release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Use a version such as v1.2.3" >&2; exit 1; }
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Promote tested image digests
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          ar="${REGION}-docker.pkg.dev/${PROJECT}/${AR_REPO}"
          api_digest="$(gcloud artifacts docker images describe "${ar}/api:${VERSION}" --format='value(image_summary.digest)')"
          web_digest="$(gcloud artifacts docker images describe "${ar}/web:${VERSION}" --format='value(image_summary.digest)')"
          [[ -n "$api_digest" && -n "$web_digest" ]] || { echo "Release ${VERSION} has no test-built artifacts." >&2; exit 1; }
          api_image="${ar}/api@${api_digest}"
          web_image="${ar}/web@${web_digest}"
          api_env_vars="NODE_ENV=production"
          [[ -z "$API_RUNTIME_ENV_VARS" ]] || api_env_vars="${api_env_vars},${API_RUNTIME_ENV_VARS}"
          gcloud run deploy "$API_SERVICE" --image="$api_image" --region="$REGION" --platform=managed --allow-unauthenticated --service-account="$RUNTIME_SERVICE_ACCOUNT" --port=4000 --cpu=1 --memory=512Mi --min-instances=0 --max-instances=4 --concurrency=80 --set-env-vars="$api_env_vars" --set-secrets="$API_RUNTIME_SECRETS"
          api_url="$(gcloud run services describe "$API_SERVICE" --region="$REGION" --format='value(status.url)')"
          curl --fail --show-error --silent "${api_url}/health"
          api_internal_url="${WEB_API_INTERNAL_URL:-${api_url}}"
          admin_api_internal_url="${WEB_ADMIN_API_INTERNAL_URL:-${api_internal_url}}"
          web_env_vars="NODE_ENV=production,NEXT_PUBLIC_API_URL=${WEB_NEXT_PUBLIC_API_URL},API_INTERNAL_URL=${api_internal_url},ADMIN_API_INTERNAL_URL=${admin_api_internal_url},AUTH_URL=${WEB_AUTH_URL},NEXT_PUBLIC_RAZORPAY_KEY_ID=${WEB_NEXT_PUBLIC_RZP_KEY}"
          [[ -z "$WEB_NEXT_PUBLIC_BRAND_LOGO" ]] || web_env_vars="${web_env_vars},NEXT_PUBLIC_BRAND_LOGO=${WEB_NEXT_PUBLIC_BRAND_LOGO}"
          [[ -z "$WEB_RUNTIME_ENV_VARS" ]] || web_env_vars="${web_env_vars},${WEB_RUNTIME_ENV_VARS}"
          gcloud run deploy "$WEB_SERVICE" --image="$web_image" --region="$REGION" --platform=managed --allow-unauthenticated --service-account="$RUNTIME_SERVICE_ACCOUNT" --port=3000 --cpu=1 --memory=512Mi --min-instances=0 --max-instances=4 --concurrency=80 --set-env-vars="$web_env_vars,RELEASE_VERSION=${VERSION}" --set-secrets="$WEB_RUNTIME_SECRETS"
          web_url="$(gcloud run services describe "$WEB_SERVICE" --region="$REGION" --format='value(status.url)')"
          curl --fail --show-error --silent --location "$web_url" > /dev/null
          printf 'Production promotion succeeded for %s\nAPI: %s\nWeb: %s\n' "$VERSION" "$api_image" "$web_image" >> "$GITHUB_STEP_SUMMARY"